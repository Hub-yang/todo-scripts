<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>

    <!-- Vite-style: one filter per blur radius -->
    <filter id="f0" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="46"/>
    </filter>
    <filter id="f1" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
    <filter id="f2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="f3" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="f4" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="ambient" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>

    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2333"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <!--
      Angular flame polygon (9 vertices, Vite-style geometric silhouette):
        tip → upper-right shoulder → right-widest → lower-right → base-right
        → base-left → lower-left → left-widest → upper-left shoulder
    -->
    <mask id="m" maskUnits="userSpaceOnUse" x="0" y="0" width="512" height="512">
      <polygon
        points="256,46 334,170 372,272 338,372 298,446 214,446 174,372 140,272 178,170"
        fill="white"/>
    </mask>

  </defs>

  <!-- Dark rounded-square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Vite-family left/right white panels (signature framing) -->
  <rect x="56" y="72" width="20" height="368" rx="10" fill="white" opacity="0.88"/>
  <rect x="436" y="72" width="20" height="368" rx="10" fill="white" opacity="0.88"/>

  <!-- Ambient halo: blurred copy of flame behind the sharp shape -->
  <polygon
    points="256,46 334,170 372,272 338,372 298,446 214,446 174,372 140,272 178,170"
    fill="#f97316" opacity="0.20" filter="url(#ambient)"/>

  <!-- ── Masked glow stack (core Vite technique) ───────────────────────────
       All children are clipped to the flame polygon.
       No linearGradient — colour transitions emerge from layered blurred ellipses.
  ───────────────────────────────────────────────────────────────────────── -->
  <g mask="url(#m)">

    <!-- Base: fill the entire masked area with darkest ember colour -->
    <rect width="512" height="512" fill="#3b0900"/>

    <!-- L1 – deep ember base (large, bottom-heavy) -->
    <ellipse cx="256" cy="400" rx="150" ry="72" fill="#7c2d12" filter="url(#f0)"/>

    <!-- L2 – orange body (tall, centred low) -->
    <ellipse cx="256" cy="318" rx="108" ry="158" fill="#c2410c" filter="url(#f1)"/>

    <!-- L3 – bright orange, Vite-signature 38° diagonal -->
    <ellipse cx="256" cy="258" rx="80" ry="128"
             fill="#f97316" filter="url(#f2)"
             transform="rotate(38 256 258)"/>

    <!-- L4 – amber, opposite 38° diagonal (creates cross-light depth) -->
    <ellipse cx="256" cy="206" rx="62" ry="102"
             fill="#f59e0b" filter="url(#f2)"
             transform="rotate(-38 256 206)"/>

    <!-- L5 – golden-yellow upper body -->
    <ellipse cx="256" cy="155" rx="44" ry="76" fill="#fbbf24" filter="url(#f3)"/>

    <!-- L6 – pale yellow rising to tip -->
    <ellipse cx="256" cy="112" rx="28" ry="52" fill="#fde68a" filter="url(#f3)"/>

    <!-- L7 – near-white hot point at very tip -->
    <ellipse cx="256" cy="80" rx="16" ry="32" fill="#fef9c3" filter="url(#f4)"/>

  </g>

  <!-- Sharp polygon edge: thin white rim echoes Vite's clean geometry -->
  <polygon
    points="256,46 334,170 372,272 338,372 298,446 214,446 174,372 140,272 178,170"
    fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>

</svg>
